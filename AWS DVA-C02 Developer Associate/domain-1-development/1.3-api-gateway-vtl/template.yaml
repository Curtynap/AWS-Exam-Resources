AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Task 1.3 - API Gateway Mapping Templates (VTL)

Resources:
  TransformFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        GetTransform:
          Type: Api
          Properties:
            RestApiId: !Ref VtlApi
            Path: /transform
            Method: get

  VtlApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      DefinitionBody:
        openapi: '3.0.1'
        info:
          title: VTL API
          version: '1.0'
        paths:
          /transform:
            get:
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TransformFunction.Arn}/invocations
                passthroughBehavior: when_no_templates
                requestTemplates:
                  application/json: |
                    {
                      "searchName": "$input.params('name')",
                      "searchCategory": "$input.params('category')",
                      "requestId": "$context.requestId"
                    }
                responses:
                  default:
                    statusCode: "200"
                    responseTemplates:
                      application/json: |
                        {
                          "statusCode": 200,
                          "data": $input.json('$'),
                          "requestId": "$context.requestId",
                          "timestamp": "$context.requestTime"
                        }
              responses:
                "200":
                  description: "200 response"

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL for Dev stage"
    Value: !Sub "https://${VtlApi}.execute-api.${AWS::Region}.amazonaws.com/dev"
